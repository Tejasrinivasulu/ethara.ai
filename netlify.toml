[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Socket.IO endpoint proxy
[[redirects]]
  from = "/socket.io/*"
  to = "/.netlify/functions/socketio/:splat"
  status = 200
  force = true

# SPA/route fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200